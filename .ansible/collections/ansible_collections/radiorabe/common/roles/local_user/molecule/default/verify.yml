---
- name: Verify
  hosts: all
  tasks:
    - name: Look up system user in passwd database
      ansible.builtin.getent:
        database: passwd
        key: mol_sysuser

    - name: Look up system group in group database
      ansible.builtin.getent:
        database: group
        key: mol_sysgroup

    - name: Look up regular user in passwd database
      ansible.builtin.getent:
        database: passwd
        key: mol_reguser

    - name: Look up group-member user in passwd database
      ansible.builtin.getent:
        database: passwd
        key: mol_groupuser

    - name: Assert system user exists
      ansible.builtin.assert:
        that:
          - "'mol_sysuser' in ansible_facts.getent_passwd"
        success_msg: "System user mol_sysuser exists"
        fail_msg: "System user mol_sysuser was not created"

    - name: Assert system group exists
      ansible.builtin.assert:
        that:
          - "'mol_sysgroup' in ansible_facts.getent_group"
        success_msg: "System group mol_sysgroup exists"
        fail_msg: "System group mol_sysgroup was not created"

    - name: Assert regular user exists
      ansible.builtin.assert:
        that:
          - "'mol_reguser' in ansible_facts.getent_passwd"
        success_msg: "Regular user mol_reguser exists"
        fail_msg: "Regular user mol_reguser was not created"

    - name: Stat regular user home directory
      ansible.builtin.stat:
        path: /home/mol_reguser
      register: user_home

    - name: Assert regular user home directory was created
      ansible.builtin.assert:
        that:
          - user_home.stat.exists
          - user_home.stat.isdir
        success_msg: "Home directory for mol_reguser exists"
        fail_msg: "Home directory for mol_reguser was not created"

    - name: Assert additional-group user exists
      ansible.builtin.assert:
        that:
          - "'mol_groupuser' in ansible_facts.getent_passwd"
        success_msg: "Group-member user mol_groupuser exists"
        fail_msg: "Group-member user mol_groupuser was not created"
