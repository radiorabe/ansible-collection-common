---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: packages-el9
    image: ghcr.io/radiorabe/ubi9-minimal:latest
    command: sleep infinity
    pre_build_image: true
  - name: packages-el10
    image: ghcr.io/radiorabe/ubi10-minimal:latest
    command: sleep infinity
    pre_build_image: true

provisioner:
  name: ansible
  env:
    ANSIBLE_PIPELINING: "True"
    ANSIBLE_FORCE_COLOR: "True"
    ANSIBLE_BECOME_ALLOW_SAME_USER: "True"
  inventory:
    group_vars:
      all:
        ansible_become_method: su

verifier:
  name: ansible
