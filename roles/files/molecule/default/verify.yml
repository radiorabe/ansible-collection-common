---
- name: Verify
  hosts: all
  tasks:
    - name: Stat test directory
      ansible.builtin.stat:
        path: /tmp/molecule_test_dir
      register: test_dir

    - name: Stat test subdirectory
      ansible.builtin.stat:
        path: /tmp/molecule_test_dir/subdir
      register: test_subdir

    - name: Stat test file
      ansible.builtin.stat:
        path: /tmp/molecule_test_dir/test_file.txt
      register: test_file

    - name: Stat copied file
      ansible.builtin.stat:
        path: /tmp/molecule_test_dir/copy_test.txt
      register: copy_file

    - name: Stat restricted file
      ansible.builtin.stat:
        path: /tmp/molecule_test_dir/restricted.txt
      register: restricted_file

    - name: Read copied file content
      ansible.builtin.slurp:
        src: /tmp/molecule_test_dir/copy_test.txt
      register: copy_content

    - name: Assert directory structure and permissions
      ansible.builtin.assert:
        that:
          - test_dir.stat.exists
          - test_dir.stat.isdir
          - test_dir.stat.mode == '0755'
          - test_subdir.stat.exists
          - test_subdir.stat.isdir
          - test_subdir.stat.mode == '0750'
          - test_file.stat.exists
          - test_file.stat.mode == '0644'
        success_msg: "Directory structure and permissions verified"
        fail_msg: "Directory or file structure verification failed"

    - name: Assert copied file content and permissions
      ansible.builtin.assert:
        that:
          - copy_file.stat.exists
          - copy_file.stat.mode == '0644'
          - (copy_content.content | b64decode) == 'molecule test content\n'
          - restricted_file.stat.exists
          - restricted_file.stat.mode == '0600'
        success_msg: "Copied files verified with correct content and permissions"
        fail_msg: "Copied file content or permissions verification failed"
