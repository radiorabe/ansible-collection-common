---
- name: Prepare - Install collection under test and create mock dependencies
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure ansible_collections/radiorabe namespace directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ansible/collections/ansible_collections/radiorabe"
        state: directory
        mode: "0755"

    - name: Get absolute path to collection root
      ansible.builtin.command:
        cmd: "realpath {{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') }}/../../../../"
      register: collection_root
      changed_when: false

    - name: Remove existing collection path to allow symlinking
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ansible/collections/ansible_collections/radiorabe/common"
        state: absent

    - name: Symlink collection to expected FQCN path
      ansible.builtin.file:
        src: "{{ collection_root.stdout }}"
        dest: "{{ lookup('env', 'HOME') }}/.ansible/collections/ansible_collections/radiorabe/common"
        state: link

    - name: Create redhat.rhel_system_roles collection structure (mock)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ lookup('env', 'HOME') }}/.ansible/collections/ansible_collections/redhat/rhel_system_roles/roles/selinux/tasks"
        - "{{ lookup('env', 'HOME') }}/.ansible/collections/ansible_collections/redhat/rhel_system_roles/roles/selinux/defaults"

    - name: Create mock galaxy.yml for redhat.rhel_system_roles
      ansible.builtin.copy:
        content: |
          namespace: redhat
          name: rhel_system_roles
          version: 1.0.0
          readme: README.md
          authors:
            - Red Hat, Inc.
          description: Mock collection for molecule testing
        dest: "{{ lookup('env', 'HOME') }}/.ansible/collections/ansible_collections/redhat/rhel_system_roles/galaxy.yml"
        mode: "0644"

    - name: Create mock selinux role defaults
      ansible.builtin.copy:
        content: |
          ---
          selinux_modules: []
        dest: "{{ lookup('env', 'HOME') }}/.ansible/collections/ansible_collections/redhat/rhel_system_roles/roles/selinux/defaults/main.yml"
        mode: "0644"

    - name: Create mock selinux role tasks (records modules instead of installing)
      ansible.builtin.copy:
        content: |
          ---
          - name: Mock selinux role - record modules to be applied
            ansible.builtin.set_fact:
              selinux_modules_applied: "{{ selinux_modules | default([]) }}"
              cacheable: false

          - name: Mock selinux role - debug modules
            ansible.builtin.debug:
              msg: "Mock: would install SELinux module {{ item.path }} (state={{ item.state | default('enabled') }})"
            loop: "{{ selinux_modules | default([]) }}"
        dest: "{{ lookup('env', 'HOME') }}/.ansible/collections/ansible_collections/redhat/rhel_system_roles/roles/selinux/tasks/main.yml"
        mode: "0644"

    - name: Create test SELinux module file (minimal stub for testing downloads)
      ansible.builtin.copy:
        content: "TESTMODULE"
        dest: /tmp/test_selinux_module.pp
        mode: "0644"
